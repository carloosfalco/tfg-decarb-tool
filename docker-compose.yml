version: "3.9"

services:
  backend:
    build:
      context: ./web-studio-v2/backend
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./web-studio-v2/backend:/app
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./web-studio-v2/frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
